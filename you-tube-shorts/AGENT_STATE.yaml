artifacts:
  gemini_doc:
    file: "./GEMINI.md"
    status: "complete"

  docker_compose:
    file: "./docker-compose.yml"
    status: "complete"

  deploy_script:
    file: "./deploy.sh"
    status: "complete"

  github_actions:
    file: "../.github/workflows/deploy-youtube-shorts.yml"
    status: "complete"

  pipeline_scripts:
    files:
      - "./scripts/process_short.sh"
      - "./scripts/youtube_auth.py"
      - "./scripts/youtube_upload.py"
      - "./scripts/health_check.sh"
    status: "complete"

  n8n_workflow:
    file: "./n8n/workflow-template.json"
    status: "complete"

  deployment_checklist:
    file: "./docs/DEPLOYMENT_CHECKLIST.md"
    status: "complete"

target_services:
  kokoro_tts:
    image: "ghcr.io/remsky/kokoro-fastapi-cpu:v0.2.2"
    port: 8880
    status: "not_deployed"

  n8n:
    location: "main_stack"
    url: "https://n8n.zubbystudio.shop"
    status: "running"

  openclaw:
    location: "../openclaw/"
    url: "http://openclaw-gateway:18789"
    status: "running"

known_constraints:
  - id: "MEM-001"
    description: "Server has <4GB RAM; Kokoro TTS on CPU may cause resource pressure"
    severity: "medium"
    mitigation: "Resource limits in docker-compose.yml; daily async schedule"

  - id: "API-001"
    description: "YouTube Data API v3 quota: 10,000 units/day (~6 uploads)"
    severity: "low"
    mitigation: "Pipeline produces max 3 Shorts/day (one per niche)"

  - id: "SCRAPE-001"
    description: "TikTok/Instagram scraping is fragile; yt-dlp needs weekly updates"
    severity: "medium"
    mitigation: "Start with YouTube-only sources; add Apify later"


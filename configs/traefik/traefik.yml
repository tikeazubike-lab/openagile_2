# configs/traefik/traefik.yml
# Static Configuration for Traefik

global:
  checkNewVersion: false
  sendAnonymousUsage: false

api:
  dashboard: true
  insecure: true

log:
  level: INFO
  format: common

accessLog:
  format: common
  bufferingSize: 100

# ========================================
# ENTRY POINTS - ALL IN ONE SECTION
# ========================================
entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
          permanent: true

  websecure:
    address: ":443"
    http:
      tls:
        certResolver: cloudflare
        domains:
          - main: zubbystudio.shop
            sans:
              - "*.zubbystudio.shop"
    http2:
      maxConcurrentStreams: 250

  metrics:
    address: ":8082"

# ========================================
# PROVIDERS
# ========================================
providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: openagile_network
    watch: true
  
  file:
    directory: /etc/traefik/dynamic
    watch: true

# ========================================
# CERTIFICATE RESOLVERS
# ========================================
certificatesResolvers:
  cloudflare:
    acme:
      email: zubbyik@gmail.com
      storage: /letsencrypt/acme.json
      # Remove this line to use PRODUCTION certificates
      # caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
      dnsChallenge:
        provider: cloudflare
        delayBeforeCheck: 30
        resolvers:
          - "1.1.1.1:53"
          - "1.0.0.1:53"

# ========================================
# METRICS FOR PROMETHEUS
# ========================================
metrics:
  prometheus:
    addEntryPointsLabels: true
    addServicesLabels: true
    addRoutersLabels: true
    entryPoint: metrics
    manualRouting: false

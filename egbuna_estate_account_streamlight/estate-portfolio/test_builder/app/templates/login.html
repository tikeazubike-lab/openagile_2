<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EPM Test Builder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <main class="login-container">
        <h1 class="login-title">EPM Test Case Builder</h1>
        <p class="login-subtitle">Quality assurance test management for the Estate Portfolio Manager</p>
        <form method="post" action="/login" class="login-form">
            <label class="form-label">
                Password
                <input type="password" name="password" required autofocus>
            </label>
            {% if error %}<p class="error-message">{{ error }}</p>{% endif %}
            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>
    </main>
</body>
</html>

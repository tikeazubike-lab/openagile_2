<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}EPM Test Builder{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    {% block nav %}
    <nav class="navbar">
        <div class="nav-links">
            <a href="/test-cases" class="nav-link">Add Test Cases</a>
            <a href="/test-cases/execute" class="nav-link">Execute Tests</a>
            <a href="/reports" class="nav-link">Reports</a>
            <a href="/admin/domain-codes" class="nav-link">Domain Codes</a>
        </div>
        <form action="/logout" method="post" class="nav-logout">
            <button type="submit" class="btn btn-ghost">Logout</button>
        </form>
    </nav>
    {% endblock %}
    <main class="container">
        {% block content %}{% endblock %}
    </main>
    <script src="/static/app.js"></script>
</body>
</html>

services:
  test-builder:
    build:
      context: ./test_builder
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env.test-builder
    environment:
      DATABASE_URL: sqlite+aiosqlite:////data/test_builder.db
      REPO_TESTS_PATH: /repo/tests
    volumes:
      - test_builder_data:/data
      - /home/zubbyik/openagile_2/egbuna_estate_account_streamlight/estate-portfolio/tests:/repo/tests
    networks:
      - openagile_openagile_network
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=openagile_openagile_network"

      # HTTPS Router
      - "traefik.http.routers.test-builder.rule=Host(`testbuild.zubbystudio.shop`)"
      - "traefik.http.routers.test-builder.entrypoints=websecure"
      - "traefik.http.routers.test-builder.tls=true"
      - "traefik.http.routers.test-builder.tls.certresolver=cloudflare"

      # HTTP → HTTPS Redirect
      - "traefik.http.routers.test-builder-http.rule=Host(`testbuild.zubbystudio.shop`)"
      - "traefik.http.routers.test-builder-http.entrypoints=web"
      - "traefik.http.routers.test-builder-http.middlewares=test-builder-redirect"
      - "traefik.http.middlewares.test-builder-redirect.redirectscheme.scheme=https"

      # Service Port
      - "traefik.http.services.test-builder.loadbalancer.server.port=8000"

volumes:
  test_builder_data:

networks:
  openagile_openagile_network:
    external: true
